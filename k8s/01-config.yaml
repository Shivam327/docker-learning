apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  DB_HOST: "db-service"
  DB_USER: "admin"
  DB_NAME: "fileapp"
  DB_PORT: "5432"
  STORAGE_TYPE: "s3"
  S3_ENDPOINT: "http://minio-service:9000"
  S3_BUCKET: "uploads"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  DB_PASSWORD: "super_secret_db_password"
  S3_ACCESS_KEY: "admin_user"
  S3_SECRET_KEY: "super_secret_key"