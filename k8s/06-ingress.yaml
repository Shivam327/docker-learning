apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  annotations:
    # This tells K8s to use the NGINX controller we enabled in Step 1
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: fileapp.local # Our custom local domain
      http:
        paths:
          # 1. Route API traffic straight to the Backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3000

          # 2. Route all other traffic to the Frontend UI
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
