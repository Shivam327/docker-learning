version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      # Injecting from the .env file
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    command: npm run dev
    volumes:
      # - ./backend:/app
      - /app/node_modules
      # - app_uploads:/app/uploads
    # Replace the manual environment list with this:
    env_file:
      - .env
    environment:
      # You can still add overrides here. We need to tell the Node app where the DB is:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  app_uploads:
  pgdata: